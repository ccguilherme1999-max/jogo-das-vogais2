<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Vogais - Pré 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #FF6B9D 0%, #FEC860 50%, #30B0C0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .stars-container {
            font-size: 3em;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .star {
            animation: popStar 0.5s ease;
        }

        @keyframes popStar {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .question-number {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .image-container {
            width: 220px;
            height: 220px;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 100%);
            border-radius: 20px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9em;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.2);
        }

        .question-text {
            font-size: 1.8em;
            color: #333;
            font-weight: bold;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .vowel-button {
            padding: 20px;
            font-size: 2.5em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            color: white;
        }

        .vowel-button:hover {
            transform: scale(1.1);
        }

        .vowel-button:active {
            transform: scale(0.95);
        }

        .btn-a {
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
        }

        .btn-a:hover {
            box-shadow: 0 12px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-e {
            background: linear-gradient(135deg, #FFA502, #FFB84D);
        }

        .btn-e:hover {
            box-shadow: 0 12px 20px rgba(255, 165, 2, 0.3);
        }

        .btn-i {
            background: linear-gradient(135deg, #FFCD56, #FFE169);
        }

        .btn-i:hover {
            box-shadow: 0 12px 20px rgba(255, 205, 86, 0.3);
        }

        .btn-o {
            background: linear-gradient(135deg, #4ECDC4, #44B0AA);
        }

        .btn-o:hover {
            box-shadow: 0 12px 20px rgba(78, 205, 196, 0.3);
        }

        .btn-u {
            background: linear-gradient(135deg, #95E1D3, #B5F0EB);
        }

        .btn-u:hover {
            box-shadow: 0 12px 20px rgba(149, 225, 211, 0.3);
        }

        .feedback {
            font-size: 2em;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.correct {
            color: #4CAF50;
        }

        .feedback.incorrect {
            color: #FF6B6B;
        }

        .hidden {
            display: none;
        }

        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-screen h1 {
            font-size: 2.8em;
            margin-bottom: 20px;
        }

        .menu-screen p {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 30px;
        }

        .start-button {
            background: linear-gradient(135deg, #FF6B9D, #FEC860);
            color: white;
            padding: 20px 40px;
            font-size: 1.8em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 12px 25px rgba(255, 107, 157, 0.3);
            transition: all 0.3s ease;
        }

        .start-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 107, 157, 0.4);
        }

        .start-button:active {
            transform: scale(0.95);
        }

        .game-over {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .final-medal {
            font-size: 5em;
            margin: 20px 0;
            animation: bounce 0.8s ease;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-30px);
            }
        }

        .final-message {
            font-size: 1.8em;
            color: #333;
            margin: 20px 0;
            font-weight: bold;
        }

        .final-score {
            font-size: 1.5em;
            color: #666;
            margin-bottom: 30px;
        }

        .restart-button {
            background: linear-gradient(135deg, #FF6B9D, #FEC860);
            color: white;
            padding: 18px 35px;
            font-size: 1.6em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 12px 25px rgba(255, 107, 157, 0.3);
            transition: all 0.3s ease;
        }

        .restart-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 107, 157, 0.4);
        }

        .restart-button:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .image-container {
                width: 150px;
                height: 150px;
                font-size: 6em;
            }

            .question-text {
                font-size: 1.5em;
            }

            .vowel-button {
                padding: 15px;
                font-size: 2em;
            }

            .buttons-container {
                gap: 8px;
            }

            .stars-container {
                font-size: 2.5em;
                gap: 8px;
            }

            .start-button,
            .restart-button {
                font-size: 1.5em;
                padding: 16px 30px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .question-text {
                font-size: 1.3em;
            }

            .vowel-button {
                padding: 12px;
                font-size: 1.5em;
            }

            .image-container {
                width: 120px;
                height: 120px;
                font-size: 5em;
            }

            .stars-container {
                font-size: 2em;
            }

            .start-button,
            .restart-button {
                font-size: 1.3em;
                padding: 14px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Menu Inicial -->
        <div id="menuScreen" class="menu-screen">
            <h1>🎮 Jogo das Vogais</h1>
            <p>Clique na vogal que começa! 🎨</p>
            <button class="start-button" onclick="startGame()">Começar Jogo</button>
        </div>

        <!-- Tela do Jogo -->
        <div id="gameScreen" class="hidden">
            <div class="stars-container" id="starsContainer"></div>
            
            <div class="question-number" id="questionNumber">Pergunta 1 de 10</div>

            <div class="image-container" id="imageEmoji">🍎</div>

            <div class="question-text">Qual vogal?</div>

            <div class="feedback" id="feedback"></div>

            <div class="buttons-container">
                <button class="vowel-button btn-a" onclick="checkAnswer('A')">A</button>
                <button class="vowel-button btn-e" onclick="checkAnswer('E')">E</button>
                <button class="vowel-button btn-i" onclick="checkAnswer('I')">I</button>
                <button class="vowel-button btn-o" onclick="checkAnswer('O')">O</button>
                <button class="vowel-button btn-u" onclick="checkAnswer('U')">U</button>
            </div>
        </div>

        <!-- Tela de Fim de Jogo -->
        <div id="gameOverScreen" class="hidden game-over">
            <h1>Parabéns! 🎉</h1>
            <div class="final-medal" id="finalMedal">🏆</div>
            <div class="final-message" id="finalMessage">Você foi incrível!</div>
            <div class="final-score" id="finalScore">10 estrelas!</div>
            <button class="restart-button" onclick="backToMenu()">Jogar Novamente</button>
        </div>
    </div>

    <script>
        const words = [
            { emoji: '🍎', vowel: 'A' },
            { emoji: '✈️', vowel: 'A' },
            { emoji: '🐝', vowel: 'A' },
            { emoji: '🐘', vowel: 'E' },
            { emoji: '🏫', vowel: 'E' },
            { emoji: '🌳', vowel: 'E' },
            { emoji: '🍦', vowel: 'I' },
            { emoji: '⛪', vowel: 'I' },
            { emoji: '🏝️', vowel: 'I' },
            { emoji: '🐑', vowel: 'O' },
            { emoji: '👓', vowel: 'O' },
            { emoji: '🐙', vowel: 'O' },
            { emoji: '🍇', vowel: 'U' },
            { emoji: '🐻', vowel: 'U' },
            { emoji: '☂️', vowel: 'U' }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let maxQuestions = 10;
        let usedQuestions = [];
        let currentWord = null;

        function startGame() {
            score = 0;
            currentQuestionIndex = 0;
            usedQuestions = [];

            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            displayQuestion();
        }

        function getRandomQuestion() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * words.length);
            } while (usedQuestions.includes(randomIndex) && usedQuestions.length < words.length);

            usedQuestions.push(randomIndex);
            return words[randomIndex];
        }

        function displayQuestion() {
            if (currentQuestionIndex >= maxQuestions) {
                endGame();
                return;
            }

            currentWord = getRandomQuestion();
            currentQuestionIndex++;

            document.getElementById('questionNumber').textContent = `Pergunta ${currentQuestionIndex} de ${maxQuestions}`;
            document.getElementById('imageEmoji').textContent = currentWord.emoji;
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';

            updateStars();
        }

        function updateStars() {
            const starsContainer = document.getElementById('starsContainer');
            starsContainer.innerHTML = '';

            for (let i = 0; i < score; i++) {
                const star = document.createElement('span');
                star.textContent = '⭐';
                star.className = 'star';
                starsContainer.appendChild(star);
            }
        }

        function checkAnswer(selectedVowel) {
            const feedbackEl = document.getElementById('feedback');
            const isCorrect = selectedVowel === currentWord.vowel;

            if (isCorrect) {
                score++;
                feedbackEl.textContent = '✅ Correto!';
                feedbackEl.className = 'feedback correct';
                playCorrectSound();
            } else {
                feedbackEl.textContent = '❌ Tente novamente!';
                feedbackEl.className = 'feedback incorrect';
            }

            setTimeout(() => {
                displayQuestion();
            }, 1500);
        }

        function playCorrectSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6

                let delay = 0;
                notes.forEach((frequency) => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();

                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime + delay);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + delay);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + delay + 0.15);

                    oscillator.start(audioContext.currentTime + delay);
                    oscillator.stop(audioContext.currentTime + delay + 0.15);

                    delay += 0.12;
                });
            } catch (e) {
                console.log('Som não disponível');
            }
        }

        function endGame() {
            const medal = getMedal(score);
            const message = getMessage(score);

            document.getElementById('finalMedal').textContent = medal;
            document.getElementById('finalMessage').textContent = message;
            document.getElementById('finalScore').textContent = `${score} estrelas de ${maxQuestions}!`;

            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function getMedal(score) {
            if (score === maxQuestions) return '🏆';
            if (score >= 8) return '🥇';
            if (score >= 6) return '🥈';
            if (score >= 4) return '🥉';
            return '🎖️';
        }

        function getMessage(score) {
            if (score === maxQuestions) return 'Perfeito! Você é uma estrela! ⭐';
            if (score >= 8) return 'Excelente! Parabéns! 🎉';
            if (score >= 6) return 'Muito bom! Continue assim! 💪';
            if (score >= 4) return 'Bom! Tente novamente! 🚀';
            return 'Continue tentando! 📚';
        }

        function backToMenu() {
            document.getElementById('menuScreen').classList.remove('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
        }
    </script>
</body>
</html>
